<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ncase - AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ncase-green: #7eb633;
            --bg-light: #f9f9f9;
            --text-dark: #1a1a1a;
            --white: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--white);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* --- ШАПКА И КОНТЕНТ --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            border-bottom: 2px solid var(--ncase-green);
            position: sticky;
            top: 0;
            background: var(--white);
            z-index: 100;
        }
        .logo { font-size: 24px; font-weight: 800; letter-spacing: -1px; }
        nav { display: flex; overflow-x: auto; white-space: nowrap; }
        nav a { text-decoration: none; color: var(--text-dark); margin: 0 15px; font-weight: 500; font-size: 14px; cursor: pointer; }

        .hero-section { padding: 10px 5%; position: relative; }
        #main-banner {
            width: 100%; height: 450px;
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), url('https://via.placeholder.com/1200x450/eeeeee/999999?text=Ncase+New+Arrivals');
            background-size: cover; background-position: center; border-radius: 24px;
            display: flex; flex-direction: column; justify-content: center; padding-left: 60px; color: white; position: relative; box-sizing: border-box;
        }
        #main-banner h1 { font-size: 60px; margin: 0; line-height: 0.9; text-transform: uppercase; }
        .upload-btn { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.8); padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 12px; color: #333; border: 1px solid #ccc; }

        .catalog { padding: 40px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }
        .product-card { background: var(--bg-light); border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; }
        .product-card .img-placeholder { height: 180px; background: #eee; border-radius: 8px; margin-bottom: 10px; }

        /* --- ТЕХПОДДЕРЖКА (ХУЙЧИК) --- */
        #chat-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.1); backdrop-filter: blur(4px); z-index: 998; opacity: 0; visibility: hidden; transition: 0.4s; }
        #chat-overlay.show { opacity: 1; visibility: visible; }

        .ai-container { position: fixed; bottom: 30px; right: 30px; z-index: 999; }
        .ai-trigger {
            width: 66px; height: 66px; background: var(--text-dark); border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .icon-shape { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .icon-line { width: 12px; height: 24px; background: var(--ncase-green); border-radius: 6px; }
        .icon-dots { display: flex; gap: 2px; }
        .icon-dot { width: 14px; height: 14px; background: var(--ncase-green); border-radius: 50%; }

        .chat-window {
            position: absolute; bottom: 85px; right: 0; width: 370px; max-width: calc(100vw - 40px); height: 520px;
            background: white; border-radius: 24px; box-shadow: 0 25px 60px rgba(0,0,0,0.2);
            display: flex; flex-direction: column; overflow: hidden; border: 1px solid rgba(0,0,0,0.05);
            opacity: 0; visibility: hidden; transform: translateY(30px) scale(0.9); transform-origin: bottom right; transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .chat-window.show { opacity: 1; visibility: visible; transform: translateY(0) scale(1); }
        .chat-header { background: var(--text-dark); color: white; padding: 20px; font-weight: 600; }
        .chat-body { flex: 1; padding: 20px; background: #fafafa; font-size: 14px; }
        .chat-input { padding: 15px; display: flex; gap: 10px; border-top: 1px solid #eee; background: white; }
        .chat-input input { flex: 1; border: none; background: #f0f0f0; padding: 12px 18px; border-radius: 25px; outline: none; }
        .chat-input button { border: none; background: var(--ncase-green); color: white; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; }

        canvas#fireworks { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; }

        /* --- СТРАНИЦА 404 (ФУЛЛ СКРИН АНИМАЦИЯ) --- */
        #page-404 {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 10000; overflow: hidden;
        }
        
        .text-layer-404 { position: absolute; top: 50%; left: 10%; transform: translateY(-50%); z-index: 10; pointer-events: none; }
        .text-layer-404 h1 { font-size: clamp(32px, 8vw, 64px); color: var(--ncase-green); margin: 0; text-transform: uppercase; font-weight: 800; }
        .text-layer-404 h2 { font-size: clamp(18px, 4vw, 24px); margin: 10px 0; }
        .text-layer-404 p { font-size: clamp(14px, 3vw, 18px); color: #888; }

        .buttons-404 { position: absolute; top: 70%; left: 10%; display: flex; gap: 15px; z-index: 20; }
        .btn-404 {
            padding: 12px 24px; border-radius: 25px; font-weight: 600; cursor: pointer;
            border: 2px solid var(--ncase-green); transition: all 0.2s ease-out; background: var(--ncase-green); color: white;
        }
        .btn-404-secondary { background: transparent; color: var(--ncase-green); }

        /* ОБЪЕКТ ТЕПЕРЬ FIXED ДЛЯ ПОЛЕТА ПО ВСЕМУ ЭКРАНУ */
        #dvd-person { 
            position: fixed; 
            width: clamp(150px, 25vw, 250px); 
            height: auto; 
            will-change: transform; 
            z-index: 5; 
            top: 0; 
            left: 0;
        }

        @media (max-width: 768px) {
            .text-layer-404 { left: 5%; top: 35%; }
            .buttons-404 { left: 5%; top: 70%; flex-direction: column; }
        }
    </style>
</head>
<body>

<div id="page-404">
    <div class="text-layer-404">
        <h1>ДА СУКА ЕТА ЕБАНА</h1>
        <h2>Ошибка 404</h2>
        <p>Страница недоступна. Кхе-кхе гыыыыыы</p>
    </div>
    <div class="buttons-404">
        <button class="btn-404" onmouseover="flee(this)" onclick="location.reload()">На головну</button>
        <button class="btn-404 btn-404-secondary" onmouseover="flee(this)" onclick="close404()">Повернутися назад</button>
    </div>
    <img src="404_sticker.webp" alt="404" id="dvd-person">
</div>

<header>
    <div class="logo">NCase</div>
    <nav><a onclick="trigger404()">Proove</a><a onclick="trigger404()">Apple</a><a onclick="trigger404()">Android</a></nav>
</header>

<section class="hero-section">
    <div id="main-banner">
        <label class="upload-btn">✎ Редагувати банер<input type="file" id="banner-upload" hidden accept="image/*"></label>
        <h1>НОВЕ<br>НАДХОДЖЕННЯ</h1>
    </div>
</section>

<section class="catalog">
    <div class="grid">
        <div class="product-card" onclick="trigger404()"><div class="img-placeholder"></div>Арт: 55758<br><b>Кабель Type-C</b></div>
        <div class="product-card" onclick="trigger404()"><div class="img-placeholder"></div>Арт: 55797<br><b>Зарядка 20W</b></div>
    </div>
</section>

<div id="chat-overlay" onclick="closeChat()"></div>
<canvas id="fireworks"></canvas>

<div class="ai-container">
    <div class="chat-window" id="chatWindow">
        <div class="chat-header">Хуйчик - ИИ горь</div>
        <div class="chat-body">Привіт! Я твій інтелектуальний хуйчик! Ncase. Чим можу допомогти?</div>
        <div class="chat-input"><input type="text" placeholder="Напишіть..."><button>🚀</button></div>
    </div>
    <div class="ai-trigger" id="aiBtn" onclick="toggleChat()">
        <div class="icon-shape"><div class="icon-line"></div><div class="icon-dots"><div class="icon-dot"></div><div class="icon-dot"></div></div></div>
    </div>
</div>

<script>
    // --- ТВОЙ ЛЮБИМЫЙ ХУЙЧИК И САЛЮТ ---
    const chatWin = document.getElementById('chatWindow');
    const overlay = document.getElementById('chat-overlay');
    const fwCanvas = document.getElementById('fireworks');
    const ctx = fwCanvas.getContext('2d');

    function toggleChat() { chatWin.classList.contains('show') ? closeChat() : openChat(); }
    function openChat() { fwCanvas.width = window.innerWidth; fwCanvas.height = window.innerHeight; createFirework(); chatWin.classList.add('show'); overlay.classList.add('show'); }
    function closeChat() { chatWin.classList.remove('show'); overlay.classList.remove('show'); }

    let particles = [];
    function createFirework() {
        const btnRect = document.getElementById('aiBtn').getBoundingClientRect();
        const startX = btnRect.left + 33, startY = btnRect.top + 33;
        for (let i = 0; i < 50; i++) particles.push({ x: startX, y: startY, vx: (Math.random() - 0.5) * 12, vy: (Math.random() - 0.5) * 12, alpha: 1, size: Math.random() * 3 + 1 });
        animateParticles();
    }
    function animateParticles() {
        ctx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.alpha -= 0.02;
            ctx.fillStyle = `rgba(126, 182, 51, ${p.alpha})`;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
            if (p.alpha <= 0) particles.splice(i, 1);
        });
        if (particles.length > 0) requestAnimationFrame(animateParticles);
    }

    // --- ОБНОВЛЕННАЯ АНИМАЦИЯ ПОЛЕТА (БЫСТРО И ПО ВСЕМУ ЭКРАНУ) ---
    const dvd = document.getElementById('dvd-person');
    let posX = 0, posY = 0, vX = 5, vY = 5, animId; // vX и vY - это скорость. Поставил 5 для бодрого полета.
    let fleeCounts = new Map();

    function moveDvd() {
        const sw = window.innerWidth, sh = window.innerHeight;
        const dw = dvd.offsetWidth, dh = dvd.offsetHeight;

        // Отскок от левой/правой стенки
        if (posX + dw >= sw || posX <= 0) {
            vX *= -1;
            // Чтобы не залипал в стене при ресайзе
            posX = posX <= 0 ? 1 : sw - dw - 1;
        }
        // Отскок от верхней/нижней стенки
        if (posY + dh >= sh || posY <= 0) {
            vY *= -1;
            posY = posY <= 0 ? 1 : sh - dh - 1;
        }

        posX += vX;
        posY += vY;

        dvd.style.transform = `translate(${posX}px, ${posY}px)`;
        animId = requestAnimationFrame(moveDvd);
    }

    function trigger404() {
        document.getElementById('page-404').style.display = 'block';
        // Рандомный старт в пределах экрана
        posX = Math.random() * (window.innerWidth - 250);
        posY = Math.random() * (window.innerHeight - 250);
        // Рандомное направление
        vX = (Math.random() > 0.5 ? 5 : -5);
        vY = (Math.random() > 0.5 ? 5 : -5);
        moveDvd();
    }
    
    function close404() { 
        document.getElementById('page-404').style.display = 'none'; 
        cancelAnimationFrame(animId); 
    }

    // Ускользающие кнопки
    function flee(btn) {
        let count = fleeCounts.get(btn) || 0;
        if (count < 10) {
            const rX = Math.random() * (window.innerWidth - btn.offsetWidth - 40);
            const rY = Math.random() * (window.innerHeight - btn.offsetHeight - 40);
            btn.style.position = 'fixed'; btn.style.left = rX + 'px'; btn.style.top = rY + 'px'; btn.style.zIndex = '10001';
            fleeCounts.set(btn, count + 1);
        }
    }

    // Обработка баннера
    document.getElementById('banner-upload').onchange = function(e) {
        const reader = new FileReader();
        reader.onload = (ev) => document.getElementById('main-banner').style.backgroundImage = `url(${ev.target.result})`;
        reader.readAsDataURL(e.target.files[0]);
    };
</script>
</body>
</html>
